name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]

env:
  NODE_VERSION: "18.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Zip app package (exclude node_modules)
        run: |
          zip -r backend-deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.env*" \
            --exclude "node_modules/*"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend-deploy.zip

      - name: Install dependencies on Azure
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group RG-3tierapp \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Enable WebSockets
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config set \
              --resource-group RG-3tierapp \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --web-sockets-enabled true

      - name: Health Check
        run: |
          sleep 60
          curl --fail https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health || echo "Still starting..."
